<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSU-OES Certificate Verification</title>
    
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 0;
            color: #333;
        }

        /* HEADER SECTION */
        .header {
            background: #ffffff;
            border-bottom: 4px solid #228B22;
            padding: 20px 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1000px;
            margin: 0 auto;
            gap: 10px;
        }

        .logo {
            width: clamp(50px, 10vw, 85px);
            height: auto;
            flex-shrink: 0;
        }

        .text-block {
            text-align: center;
            flex-grow: 1;
        }

        .university-name {
            font-family: 'UnifrakturMaguntia', serif;
            font-size: clamp(22px, 5vw, 36px);
            margin: 0;
            color: #20650a;
            line-height: 1.2;
        }

        .office-subtext {
            font-family: "Times New Roman", serif;
            font-size: clamp(10px, 2.5vw, 14px);
            margin: 2px 0;
            color: #20650a;
            text-transform: uppercase;
            font-weight: bold;
        }

        .portal-badge {
            font-size: 13px;
            font-weight: 800;
            color: #082103;
            display: inline-block;
            margin-top: 10px;
            border-top: 2px solid #082103;
            padding-top: 5px;
            letter-spacing: 1px;
        }

        /* MAIN CARD */
        .container {
            background: white;
            width: 95%;
            max-width: 450px;
            margin: 40px auto;
            padding: 30px 20px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.1);
            text-align: center;
        }

        h4 { margin-bottom: 20px; color: #444; }

        input {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #228B22;
            box-shadow: 0 0 8px rgba(34, 139, 34, 0.2);
        }

        .btn-verify {
            width: 100%;
            padding: 15px;
            background: #228B22;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-verify:hover { background: #1a6b1a; transform: translateY(-1px); }

        /* RESULTS AREA */
        #result { margin-top: 25px; }

        .status-msg {
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .valid { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .invalid { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }

        .cert-details {
            text-align: left;
            background: #fdfdfd;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #eee;
            font-size: 14px;
            line-height: 1.6;
        }

        .btn-download {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 15px;
            width: 100%;
            padding: 14px;
            background: #0069d9;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-download:hover { background: #0056b3; }

        /* MOBILE RESPONSIVE */
        @media (max-width: 600px) {
            .header-content { flex-direction: column; gap: 15px; }
            .container { margin-top: 20px; padding: 20px; }
            .logo-group { display: flex; gap: 10px; justify-content: center; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-content">
        <div class="logo-group">
            <img src="images/bsu-logo.png" class="logo" alt="BSU">
            <img src="images/ovpre-logo.png" class="logo" alt="OVPRE">
        </div>
        
        <div class="text-block">
            <h3 class="university-name">Benguet State University</h3>
            <p class="office-subtext">Office of the VP for Research and Extension</p>
            <p class="office-subtext">Office of Extension Services</p>
            <span class="portal-badge">CERTIFICATE VERIFICATION PORTAL</span>
        </div>

        <img src="images/oes-logo.png" class="logo" alt="OES">
    </div>
</div>

<div class="container">
    <h4>Verify Certificate Authenticity</h4>
    <input type="text" id="code" placeholder="Enter Certificate Code (e.g., OES-2024-001)" spellcheck="false">
    <button class="btn-verify" onclick="verify()">Verify Certificate</button>

    <div id="result"></div>
</div>

<script>
async function verify() {
    const input = document.getElementById("code").value.trim().toUpperCase();
    const resultDiv = document.getElementById("result");
    const btn = document.querySelector(".btn-verify");

    if (!input) {
        resultDiv.innerHTML = `<div class="status-msg invalid">Please enter a code.</div>`;
        return;
    }

    // Loading State
    btn.disabled = true;
    btn.innerText = "Searching...";
    resultDiv.innerHTML = "Connecting to database...";

    try {
        const response = await fetch("https://opensheet.elk.sh/1yWJfd9Exp95Pjh24MypkvUjCGgh9AEcW6RRt-EAssSk/Sheet1");
        const data = await response.json();

        const found = data.find(c => 
            c.cert_code && c.cert_code.toString().trim().toUpperCase() === input
        );

        if (found) {
            let downloadBtn = "";
            if (found.file_url) {
                downloadBtn = `
                    <a href="${found.file_url}" target="_blank" class="btn-download">
                        <span>📄</span> View & Download PDF
                    </a>
                `;
            }

            resultDiv.innerHTML = `
                <div class="status-msg valid">✔ VALID CERTIFICATE FOUND</div>
                <div class="cert-details">
                    <p><strong>Issued To:</strong> ${found.name}</p>
                    <p><strong>Training:</strong> ${found.training}</p>
                    <p><strong>Date Issued:</strong> ${found.date}</p>
                </div>
                ${downloadBtn}
            `;
        } else {
            resultDiv.innerHTML = `
                <div class="status-msg invalid">✖ INVALID CERTIFICATE</div>
                <p style="font-size: 13px; color: #666;">No records found for "${input}". Please check the code and try again.</p>
            `;
        }
    } catch (error) {
        resultDiv.innerHTML = `<div class="status-msg invalid">Database Error. Please try again later.</div>`;
    } finally {
        btn.disabled = false;
        btn.innerText = "Verify Certificate";
    }
}

// Support for URL parameters (e.g., yourpage.com/?code=OES-01)
window.onload = function () {
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    if (code) {
        document.getElementById("code").value = code;
        verify();
    }
};
</script>

</body>
</html>
