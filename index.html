<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSU-OES Certificate Verification</title>
    
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }

        /* HEADER */
        .header { background: white; border-bottom: 4px solid #228B22; padding: 15px; width: 100%; }
        .header-content { display: flex; align-items: center; justify-content: space-between; max-width: 1100px; margin: 0 auto; gap: 10px; }
        
        .logo-side { display: flex; gap: 8px; align-items: center; }
        .logo { width: clamp(50px, 8vw, 85px); height: auto; }
        
        .text-block { text-align: center; flex: 1; }
        .university-name { font-family: 'UnifrakturMaguntia', serif; font-size: clamp(20px, 4.5vw, 38px); margin: 0; color: #20650a; line-height: 1.1; }
        .sub-text { font-family: "Times New Roman", serif; font-size: clamp(10px, 2vw, 14px); color: #20650a; text-transform: uppercase; margin: 2px 0; font-weight: bold; }
        .portal-label { font-size: 13px; font-weight: 800; border-top: 2px solid #082103; margin-top: 8px; padding-top: 5px; display: inline-block; letter-spacing: 1px; color: #082103; }

        /* MAIN CARD */
        .container { background: white; width: 92%; max-width: 450px; margin: 40px auto; padding: 30px 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        h4 { margin-top: 0; color: #444; font-size: 18px; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; text-align: center; transition: 0.3s; }
        input:focus { border-color: #228B22; outline: none; box-shadow: 0 0 8px rgba(34,139,34,0.1); }
        
        .btn-verify { width: 100%; padding: 15px; background: #228B22; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-verify:hover { background: #1a6b1a; transform: translateY(-1px); }
        .btn-verify:disabled { background: #ccc; cursor: not-allowed; }

        /* RESULTS AREA */
        #result { margin-top: 25px; min-height: 50px; }
        .status-msg { padding: 15px; border-radius: 10px; font-weight: bold; margin-bottom: 15px; font-size: 15px; }
        .valid { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .invalid { background: #ffebee; color: #c62828; border: 1px solid #ffcdd2; }
        
        .cert-details { text-align: left; background: #fdfdfd; padding: 15px; border-radius: 10px; border: 1px solid #eee; font-size: 14px; line-height: 1.8; margin-bottom: 15px; }
        .cert-details strong { color: #555; }

        /* DOWNLOAD BUTTON */
        .btn-download { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 15px; background: #0061f2; color: white; text-decoration: none; border-radius: 10px; font-weight: bold; font-size: 15px; transition: 0.3s; }
        .btn-download:hover { background: #004ec2; box-shadow: 0 4px 12px rgba(0,97,242,0.3); }

        /* MOBILE FIX */
        @media (max-width: 650px) {
            .header-content { flex-direction: column; text-align: center; }
            .logo-side { justify-content: center; width: 100%; }
            .logo-oes { order: -1; margin-bottom: -5px; }
            .container { margin-top: 20px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-content">
        <div class="logo-side">
            <img src="images/bsu-logo.png" class="logo" alt="BSU">
            <img src="images/ovpre-logo.png" class="logo" alt="OVPRE">
        </div>
        <div class="text-block">
            <h3 class="university-name">Benguet State University</h3>
            <p class="sub-text">Office of the VP for Research and Extension</p>
            <p class="sub-text">Office of Extension Services</p>
            <span class="portal-label">CERTIFICATE VERIFICATION PORTAL</span>
        </div>
        <div class="logo-side logo-oes">
            <img src="images/oes-logo.png" class="logo" alt="OES">
        </div>
    </div>
</div>

<div class="container">
    <h4>Verify Certificate Authenticity</h4>
    <input type="text" id="code" placeholder="Enter Certificate Code" autocomplete="off" spellcheck="false">
    <button class="btn-verify" onclick="verify()">Verify Certificate</button>
    <div id="result"></div>
</div>

<script>
async function verify() {
    const codeInput = document.getElementById("code").value.trim().toUpperCase();
    const resultDiv = document.getElementById("result");
    const verifyBtn = document.querySelector(".btn-verify");

    if (!codeInput) {
        resultDiv.innerHTML = `<div class="status-msg invalid">Please enter a code.</div>`;
        return;
    }

    // Set Loading State
    verifyBtn.disabled = true;
    verifyBtn.innerText = "Searching Records...";
    resultDiv.innerHTML = `<p style="color: #666; font-size: 14px;">Consulting database...</p>`;

    try {
        // Fetch from Elk (Google Sheets Proxy)
        const response = await fetch("https://opensheet.elk.sh/1yWJfd9Exp95Pjh24MypkvUjCGgh9AEcW6RRt-EAssSk/Sheet1");
        if (!response.ok) throw new Error("Network response was not ok");
        
        const data = await response.json();
        
        // Find the matching row
        const found = data.find(row => 
            row.cert_code && row.cert_code.toString().trim().toUpperCase() === codeInput
        );

        if (found) {
            // Attempt to find a link in common column names
            const downloadLink = found.file_url || found.link || found.download || found.pdf_link;
            
            let downloadButtonHtml = "";
            if (downloadLink) {
                downloadButtonHtml = `
                    <a href="${downloadLink}" target="_blank" class="btn-download">
                        <span>📄</span> View & Download Official PDF
                    </a>
                `;
            } else {
                downloadButtonHtml = `<p style="font-size: 12px; color: #888; margin-top: 10px;">Digital file currently unavailable.</p>`;
            }

            resultDiv.innerHTML = `
                <div class="status-msg valid">✔ VERIFIED AUTHENTIC</div>
                <div class="cert-details">
                    <p><strong>Issued To:</strong> ${found.name || 'N/A'}</p>
                    <p><strong>Training:</strong> ${found.training || 'N/A'}</p>
                    <p><strong>Date Issued:</strong> ${found.date || 'N/A'}</p>
                </div>
                ${downloadButtonHtml}
            `;
        } else {
            resultDiv.innerHTML = `
                <div class="status-msg invalid">✖ RECORD NOT FOUND</div>
                <p style="font-size: 13px; color: #777;">No certificate matches the code "${codeInput}".</p>
            `;
        }
    } catch (error) {
        console.error("Fetch error:", error);
        resultDiv.innerHTML = `<div class="status-msg invalid">Connection error. Please check your internet and try again.</div>`;
    } finally {
        verifyBtn.disabled = false;
        verifyBtn.innerText = "Verify Certificate";
    }
}

// Allow auto-verify if code is in the URL (e.g. ?code=XYZ)
window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    const code = params.get("code");
    if (code) {
        document.getElementById("code").value = code;
        verify();
    }
};
</script>

</body>
</html>
