<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSU-OES Certificate Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturMaguntia&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }

        /* HEADER */
        .header { background: white; border-bottom: 4px solid #228B22; padding: 15px; }
        .header-content { display: flex; align-items: center; justify-content: space-between; max-width: 1100px; margin: 0 auto; gap: 10px; }
        
        .logo-side { display: flex; gap: 8px; align-items: center; }
        .logo { width: clamp(50px, 8vw, 80px); height: auto; }
        
        .text-block { text-align: center; flex: 1; }
        .university-name { font-family: 'UnifrakturMaguntia', serif; font-size: clamp(20px, 4vw, 36px); margin: 0; color: #20650a; }
        .sub-text { font-family: "Times New Roman", serif; font-size: clamp(10px, 2vw, 14px); color: #20650a; text-transform: uppercase; margin: 2px 0; font-weight: bold; }
        .portal-label { font-size: 13px; font-weight: 800; border-top: 2px solid #082103; margin-top: 8px; padding-top: 5px; display: inline-block; letter-spacing: 1px; }

        /* CONTAINER */
        .container { background: white; width: 92%; max-width: 450px; margin: 30px auto; padding: 30px 20px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 14px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; text-align: center; }
        .btn-verify { width: 100%; padding: 14px; background: #228B22; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-verify:hover { background: #1a6b1a; }
        
        /* RESULT BOXES */
        #result { margin-top: 20px; }
        .status { padding: 12px; border-radius: 8px; font-weight: bold; margin-bottom: 15px; }
        .valid { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .invalid { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        
        .details { text-align: left; background: #fdfdfd; padding: 15px; border-radius: 8px; border: 1px solid #eee; font-size: 14px; line-height: 1.6; }
        .btn-download { display: block; margin-top: 15px; padding: 12px; background: #007bff; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; transition: 0.3s; }
        .btn-download:hover { background: #0056b3; }

        /* MOBILE FIX */
        @media (max-width: 650px) {
            .header-content { flex-direction: column; }
            .logo-side { justify-content: center; width: 100%; }
            .logo-oes { order: -1; margin-bottom: -10px; } /* Moves OES logo to top row area on mobile */
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-content">
        <div class="logo-side">
            <img src="images/bsu-logo.png" class="logo" alt="BSU">
            <img src="images/ovpre-logo.png" class="logo" alt="OVPRE">
        </div>
        <div class="text-block">
            <h3 class="university-name">Benguet State University</h3>
            <p class="sub-text">Office of the VP for Research and Extension</p>
            <p class="sub-text">Office of Extension Services</p>
            <span class="portal-label">CERTIFICATE VERIFICATION PORTAL</span>
        </div>
        <div class="logo-side logo-oes">
            <img src="images/oes-logo.png" class="logo" alt="OES">
        </div>
    </div>
</div>

<div class="container">
    <h4>Enter Certificate Code</h4>
    <input type="text" id="code" placeholder="Example: OES-2024-001" autocomplete="off">
    <button class="btn-verify" onclick="verify()">Verify Certificate</button>
    <div id="result"></div>
</div>

<script>
async function verify() {
    const inputCode = document.getElementById("code").value.trim().toUpperCase();
    const resultDiv = document.getElementById("result");
    
    if (!inputCode) {
        resultDiv.innerHTML = `<div class="status invalid">Please enter a code.</div>`;
        return;
    }

    resultDiv.innerHTML = "Processing...";

    try {
        const response = await fetch("https://opensheet.elk.sh/1yWJfd9Exp95Pjh24MypkvUjCGgh9AEcW6RRt-EAssSk/Sheet1");
        const data = await response.json();
        
        const found = data.find(c => c.cert_code && c.cert_code.toString().trim().toUpperCase() === inputCode);

        if (found) {
            // "file_url" is the header for Column F
            let downloadBtn = found.file_url ? 
                `<a href="${found.file_url}" target="_blank" class="btn-download">Download Official PDF</a>` : 
                `<p style="font-size:12px; color:gray;">(Digital copy not yet available)</p>`;
            
            resultDiv.innerHTML = `
                <div class="status valid">✔ VERIFIED AUTHENTIC</div>
                <div class="details">
                    <p><strong>Issued To:</strong> ${found.name}</p>
                    <p><strong>Program:</strong> ${found.training}</p>
                    <p><strong>Date:</strong> ${found.date}</p>
                </div>
                ${downloadBtn}
            `;
        } else {
            resultDiv.innerHTML = `<div class="status invalid">✖ RECORD NOT FOUND</div>`;
        }
    } catch (e) {
        resultDiv.innerHTML = `<div class="status invalid">Server Error. Please try again later.</div>`;
    }
}
</script>

</body>
</html>
